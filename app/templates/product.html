{% extends "layout.html" %}

{% block content %}
  <section class="mb-4">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="border">
          <div class="ratio ratio-1x1">
            <div class="d-flex align-items-center justify-content-center p-3 text-body-secondary">
              Image coming soon
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-8">
        <h2 class="mb-3">{{ product.name }}</h2>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-2 mb-3">
          <div class="col">
            <div class="border rounded p-2 h-100">
              <small class="text-uppercase text-body-secondary">Price</small>
              <div class="fw-bold">{{ product.price }} USD</div>
            </div>
          </div>

          <div class="col">
            <div class="border rounded p-2 h-100">
              <small class="text-uppercase text-body-secondary">Stock</small>
              <div class="fw-bold">{{ product.stock }}</div>
            </div>
          </div>

          <div class="col">
            <div class="border rounded p-2 h-100">
              <small class="text-uppercase text-body-secondary">Category</small>
              <div class="fw-bold">{{ product.category.name }}</div>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <small class="text-uppercase text-body-secondary">Description</small>
          <p class="mt-2">{{ product.description }}</p>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 g-2">
          <div class="col">
            <a class="btn btn-warning w-100" href="{{ url_for('products.edit_product', product_id=product.id) }}">Edit Product</a>
          </div>

          <div class="col">
            <form id="deleteProductForm"
                  method="post"
                  action="{{ url_for('products.delete_product', product_id=product.id) }}">
              <button type="button"
                      class="btn btn-danger w-100"
                      data-bs-toggle="modal"
                      data-bs-target="#confirmDeleteModal"
                      data-form-id="deleteProductForm"
                      data-item-name="this product">Delete Product</button>
            </form>
          </div>

          <div class="col">
            <a class="btn btn-secondary w-100"
               href="{{ url_for('categories.view_category', category_id=product.category_id) }}">Back to Category</a>
          </div>

          <div class="col">
            <a class="btn btn-secondary w-100" href="{{ url_for('products.list_products') }}">Back to Products</a>
          </div>
        </div>

      </div>
    </div>
  </section>

{% endblock content %}
